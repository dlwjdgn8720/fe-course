<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인폼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin-bottom: 7px;
        }

        .wrapper {
            background-color: rgb(50, 54, 70);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        button {
            padding: 8px 70px;
            border-radius: 1rem;
            background-color: rgb(246, 179, 70);
            color: white;
            font-size: 25px;
            margin-top: 20px;
        }
        
        .input-username,
        .input-password {
            position: relative;
            display: flex;   
        }

        form input[type="text"],
        [type="password"] {
            width: 320px;
            height: 15px;
            color: #555;
            font-size: 20px;
            padding-left: 10px; 
            padding-top: 10px;
            padding-bottom: 15px;
            position: relative;
            border: none;
        }
        .input-username input::placeholder,
        .input-password input::placeholder{
            position: absolute;
            top: 8px;
        }
        .fa-crown{
            position:absolute;
            color: gold;
            top: 10px;
            left: 10.5px;
            transform: translate(45px,45px);
        }
        .circle{
            width: 50px;
            height :50px;
            border-radius: 50%;
            background-color: black;
            position: absolute;
            transform: translate(30px,30px);
            top:10px;
            left:10px;
        }
        .div-fa-envelope-open,.div-fa-lock{
            width: 40px;
            height : 40px;
            border-right: 1px solid #444;
            background-color: lightgray;
            align-content: center;
            margin-left: 1px;
        }
    </style>
</head>

<body>
    <header></header>
    
    <main>
        <div class="wrapper">
            <!--로그인 폼-->
            <div>
                <div class="circle"></div>
                <i class="fa-solid fa-crown"></i>
            </div>
            <form action="#" method="get">
                <div style="margin-bottom: 50px;">
                    <i class="fa-solid fa-circle-user fa-10x"></i>
                </div>

                <div class="input-username" style="margin-bottom: 20px;">
                    <div class="div-fa-envelope-open">
                        <i class="fa-solid fa-envelope-open"></i>
                    </div>
                    <input type="text" name="name" placeholder="Username">
                </div>

                <div class="input-password">
                    <div class="div-fa-lock">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" name="password" placeholder="Password">
                </div>

                <div style="font-size: 13px;">
                    <input type="radio" name="check" value="remember">
                    <label for="remember" style="margin-right: 110px;">Remember me</label>

                    <input type="radio" name="check" value="forgot">
                    <label for="password">Forgot your password?</label>
                </div>

                <div>
                    <button type="submit">Login</button>
                </div>
            </form>
        </div>
    </main>
    <footer></footer>
</body>

</html>
