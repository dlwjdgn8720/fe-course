<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InlineBlock</title>
</head>
<body>
    <!-- 블록은 크기조정 가능,인라인은 크기조정 안됨 -->
    <!-- 인라인블록은 크기조정 가능,인라인 특성상 옆으로 배치됨-->
    <!-- 블록으로 지정하면 한칸 뛰고 배치됨 --> 
    <h1>인라인블록(inline-block) 레벨</h1>

    <div>
        <img src = "../images/img01.png" 
            style="width: 200px;"
            alt = "tree"> 
    </div>

    <div>
        <img src = "../images/img01.png" 
            style="width: 200px;"
            alt = "tree">    
    </div>
     
</body>
</html>
