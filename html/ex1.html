<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex1</title>
</head>

<body>

    <div>
        <h1>웹 개발 교육 상담 문의</h1><br>
        <p>HTML,CSS,JavaScript,React,프론트앤드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해드립니다.</p>
    </div>

    <form action="#" method="GET">
        <fieldset>
            <legend>상담 신청 정보</legend>

            <div>
                <label for="name">이름* </label>
                <input type="text" name="name">
                <p>실명을 입력해 주세요.</p>           
            </div>

            <div>
                <label for="address">이메일* </label>
                <input type="text" name="address" placeholder="example@example.com">
                <p>답변을 받을 이메일 주소를 입력해주세요</p>
            </div>
            
            <div>
                <label for="telephone">연락처</label>
                <input type="text" name="telephone" placeholder="010-0000-0000">            
            </div>

            <div>
                <label for="관심과정">관심과정* </label>
                <select name="관심과정">
                    <option value="선택">선택하세요</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="React">React</option>
                </select>
            </div>
            
            <div>
                <label for="문의내용">문의내용* </label>
                <textarea name="문의내용" placeholder="궁금한 내용을 자세히 입력해주세요"></textarea>
                <p>예 : 수업일정,수강대상,비용,프로젝트 중심 수업 여부등</p>
            </div>

            <div>
                <input type="checkbox" name="isCheck" value="agree"><span>개인정보 수집 및 이용에 동의합니다.*</span>
            </div>

            <button type="submit">상담 문의 보내기</button>
        </fieldset>
    </form>
</body>
</html>
