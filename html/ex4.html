<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .grid {
            display: flex;
            gap: 1rem;
        }

        .grid div {
            flex: 1;
            background: #f5f5f5;
            padding: 1.2rem;
            border-radius: 8px;
        }

        @media(max-width:768px) {
            .grid {
                flex-direction: column;
            }
        }

        .btn {
            padding: 12px 22px;
            background: #4A63E7;
            color: #fff;
            border-radius: 8px;
            display: inline-block;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background: #3549b5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transform: translateY(-1px);
        }

        nav ul {
            display: flex;
            list-style: none;
            padding: 0;
            gap: 20px;
            justify-content: center;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            transition: 0.2s;
        }

        nav a:hover {
            color: #4A63E7;
        }

        .card {
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card img {
            width: 25%;
            border-radius: 8px;
        }

        .card h3 {
            margin: 0.8rem 0 0.5rem;
            color: #333;
        }

        .card p {
            color: #666;
            font-size: 0.95rem;
        }

        .card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="#">홈</a></li>
            <li><a href="#">소개</a></li>
            <li><a href="#">포트폴리오</a></li>
            <li><a href="#">문의</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="grid">
            <div>첫번째 박스</div>
            <div>두번째 박스</div>
            <div>세번째 박스</div>
        </div>
    </div>

    <a href="#" class="btn">자세히 보기</a>

    <div class="card">
        <img src="/images/img01.png" alt="샘플 이미지">
        <h3>카드 제목 예시</h3>
        <p>이 영역에 상세 설명을 넣으세요. 유지보수가 쉽고 시각적으로 매력적입니다.</p>
    </div>

</body>

</html>
