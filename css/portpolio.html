<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portpolio</title>
    <style>
        header{
            /* width: 100%; */
            display: flex;
            justify-content: space-between;
            background-color: black;
            color: white;
            height: 450px;
            position: relative;
            /*box-sizing: border-box;
            overflow: hidden; */
        }
       
        .header-logo img{
            width: 20px;
            height: 20px;
            margin-top: 6px;
            margin-left: 4px;
        }
        .header-nav{
            /* border: 1px solid red; */
            display: flex;
            list-style-type: none;
            gap: 25px;
            margin-top : 10px;
            margin-right: 15px;           
        }     
        .header-nav li a{
            text-decoration: none;
            color: white;
        }
               
        .header-avata-wrap{
            /* border: 1px solid red; */
            text-align: center;
            position: absolute;
            left:50%;
            top: 15%;
            transform: translateX(-50%); 
        }
        .header-avata-img img{
            width: 150px;
            border: 3px solid aqua;
            box-sizing: border-box;
            border-radius: 80px;
        }
        .header-intro-bold{
            font-weight: bold;
            font-size: 25px;
        }
        
        .btn_contact{
            width: 20px;
            text-decoration: none;
            background-color: aqua;
            color: black;
            border-radius: 2px;
            padding: 4px;
        }
        </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="../images/favicon_judy.ico" alt="logo">
            <span style="font-weight: bold;">Judy</span>
        </div>
        <nav>
            <ul class="header-nav">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">My work</a></li>
                <li><a href="#">Testimonial</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="header-avata-wrap">
            <div class="header-avata-img">
                <img src="../images/avata.png" alt="avata">
            </div>
            <div class>
                <div class="header-intro-bold">
                    <div>Hello</div>
                    <div>I'm <span style= "color: aqua;">Dream Coder</span>, Judy</div>
                </div>
                <p style="font-size: 15px;">A software engineer currently residing in Seoul,South korea</p>
                <div style="margin-top: 25px;"><a href="#" class="btn_contact">Contact me</a></div>
            </div>
        </div>

    </header>


    <main></main>

    <footer></footer>
</body>
</html>
