<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">

    <title>StarBucks Menu</title>
    <style>
        * {
            font-family: 'Nanum Gothic';
            /* background-color: rgb(246, 245, 239); */
            background-color: transparent;
            /* border: 1px solid red; */
        }
       
        header {
            /* border: 1px solid green; */
            width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }

        .header-menu-top ul,
        .header-menu-bottom ul {
            /* border: 1px solid red; */
            display: flex;
            list-style: none;
            justify-content: right;
        }

        .header-menu-top ul {
            gap: 20px;
            font-size: 0.9rem;
        }

        .header-menu-bottom ul {
            gap: 25px;
        }

        .header-menu-top ul a,
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }

        .header-menu-bottom ul a {
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }

        .header-menu-top li:last-child i {
            font-size: 1.5rem;
            font-weight: 700;
            background-color: white;
        }

        .header-menu-top li:last-child input {
            display: none;
        }

        .bg-div-wrap{
            width: 100%;
            height: 32.3vw;
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no repeat;
            background-position: center;
            background-size: cover;
            position: relative;
        }
        .slogan-div {
            position: absolute;
            top: 200px;
            left: 200px;
        }

        .img2{
            position: absolute;
            left: 700px;
            top: 100px;
        }

        .img3{
            position: absolute;
            left: 880px;
            top: 160px;
        }
        .img4{
            position: absolute;
            left: 990px;
            top: 100px;
        }
        .img5{
            position: absolute;
            left: 1200px;
            top: 100px;
        }
        .img6{
            position: absolute;
            left: 1360px;
            top: 100px;
        }

        .img1,.img2,.img3,.img4,.img5,.img6,.btn_slogan{
            opacity: 0;
            animation: fadeInUp 5s ease forwards;
        }
        .img1{
            animation-delay: 0.5s;
        }
        .img2{
            animation-delay: 1s;
        }
        .img3{
            animation-delay: 1.5s;
        }
        .img4{
            animation-delay: 2s;
        }
        .img5{
            animation-delay: 2.5s;
        }
        .img6{
            animation-delay: 3s;
        }
        .btn_slogan{
            animation-delay: 3.5s;
        }

        @keyframes fadeInUp {
            from{
                opacity: 0;
                transform: translateY(50px);
            }
            to{
                opacity: 1;
            }
        }
        .btn_slogan{
            position: absolute;
            top: 350px;
            left: 350px;
        }
        .btn_slogan a{
            display: block;
            width: 100px;
            height: 30px;
            border-radius: 5px;
            border: 3px solid rgb(172, 133, 186);
            text-decoration: none;
            color: rgb(172, 133, 186);
            font-size: 15px;    
            text-align: center;
            line-height: 34px;
        }
        .btn_slogan a:hover{
            color:white;
            text-decoration: underline;
        }
        .btn_slogan:hover{
            background-color: rgb(172, 133, 186);
        }      
    </style>
</head>

<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text">
                        <a href="#"><i class="fa-brands fa-sistrix"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWORD</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="bg-div-wrap">
            <div class="slogan-div">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png"
                    alt="slogan" class="img1">
            </div>
            <div class="common-img-div">
                <div class="img2">
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png"
                        alt="">
                </div>

                <div class="img3">
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png"
                        alt="">
                </div>

                <div class="img4">
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png"
                        alt="">
                </div>

                <div class="img5">
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png"
                        alt="">
                </div>

                <div class="img6">
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png"
                        alt="">
                </div>
            </div>
            <div class="btn_slogan">
                <a href="#">자세히 보기</a>
            </div>
        </div>

    </main>
</body>

</html>
